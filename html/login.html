<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <title>Urban Threads | Login</title>
  </head>
  <body>
    <header class="navbar">
      <h1 class="logo">Urban Threads</h1>
      <nav>
        <ul class="nav-links">
          <li id="user-display" class="user-display"></li>
          <li><a href="../index.html">Home</a></li>
          <li><a href="./shop.html">Shop</a></li>
          <li><a href="./cart.html">Cart</a></li>
          <li><a href="./login.html" id="login-link">Login</a></li>
          <li><a href="#" id="logout-link" style="display: none">Logout</a></li>
        </ul>
      </nav>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <h2 id="auth-title">Login</h2>

        <form id="auth-form" class="auth-form" novalidate>
          <input
            type="text"
            id="name"
            placeholder="Enter username"
            style="display: none"
            maxlength="10"
          />
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
          />

          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />

          <button type="submit" id="submit-btn" class="auth-submit-btn">
            Log In
          </button>
          <p id="switch-mode" class="switch-mode-text">
            Don't have an account?
            <button type="button" id="toggle-auth" class="toggle-auth-btn">
              Sign Up
            </button>
          </p>
          <p id="auth-message" class="auth-message" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <script type="module" src="../js/auth.js"></script>
  </body>
</html>
