<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Urban Threads | Login</title>
  </head>
  <body>
    <header class="navbar">
      <h1 class="logo">Urban Threads</h1>

      <nav>
        <ul class="nav-links">
          <li id="user-display" class="user-display desktop-nav-item"></li>
          <li class="desktop-nav-item">
            <button
              type="button"
              id="theme-toggle"
              class="theme-toggle-btn"
              aria-label="Toggle theme"
              aria-pressed="false"
            >
              Light Mode
            </button>
          </li>
          <li class="desktop-nav-item"><a href="../index.html">Home</a></li>
          <li class="desktop-nav-item"><a href="./shop.html">Shop</a></li>

          <li>
            <a href="./cart.html" class="cart-link">
              <span class="material-icons cart-material-icon"
                >shopping_cart</span
              >
              <span id="cart-count" class="cart-count">0</span>
            </a>
          </li>

          <li class="desktop-nav-item">
            <a href="./login.html" id="login-link">Login</a>
          </li>

          <li class="desktop-nav-item">
            <a href="#" id="logout-link" style="display: none">Logout</a>
          </li>

          <li class="menu-toggle-item">
            <button
              type="button"
              id="menu-toggle"
              class="menu-toggle"
              aria-label="Open menu"
              aria-controls="mobile-menu"
              aria-expanded="false"
            >
              <span class="material-icons">menu</span>
            </button>
          </li>
        </ul>
      </nav>

      <div id="mobile-menu" class="mobile-menu" aria-hidden="true">
        <div id="mobile-menu-overlay" class="mobile-menu-overlay"></div>

        <aside class="mobile-menu-panel" aria-label="Mobile navigation">
          <div class="mobile-menu-top">
            <div>
              <p class="mobile-menu-label">Urban Threads</p>
              <p id="mobile-user-display" class="mobile-user-display"></p>
            </div>

            <button
              type="button"
              id="mobile-menu-close"
              class="mobile-menu-close"
              aria-label="Close menu"
            >
              <span class="material-icons">close</span>
            </button>
          </div>

          <nav class="mobile-menu-nav">
            <a href="../index.html" class="mobile-menu-link">Home</a>
            <a href="./shop.html" class="mobile-menu-link">Shop</a>
            <a href="./cart.html" class="mobile-menu-link">Cart</a>
            <a
              href="./login.html"
              id="mobile-login-link"
              class="mobile-menu-link"
              >Login</a
            >
            <a
              href="#"
              id="mobile-logout-link"
              class="mobile-menu-link"
              style="display: none"
              >Logout</a
            >
          </nav>

          <button
            type="button"
            id="mobile-theme-toggle"
            class="mobile-theme-toggle-btn"
            aria-label="Toggle theme"
            aria-pressed="false"
          >
            Light Mode
          </button>
        </aside>
      </div>
    </header>

    <main class="auth-page">
      <div class="auth-card">
        <h2 id="auth-title">Login</h2>

        <form id="auth-form" class="auth-form" novalidate>
          <input
            type="text"
            id="name"
            placeholder="Enter username"
            style="display: none"
            maxlength="10"
          />
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
          />

          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />

          <button type="submit" id="submit-btn" class="auth-submit-btn">
            Log In
          </button>
          <p id="switch-mode" class="switch-mode-text">
            Don't have an account?
            <button type="button" id="toggle-auth" class="toggle-auth-btn">
              Sign Up
            </button>
          </p>
          <p id="auth-message" class="auth-message" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <script type="module" src="../js/auth.js"></script>
  </body>
</html>
